<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>University registeration Form </h1>

    <p>fill the form</p>

    <hr>

    <form action="">
        <h2>Personal Details</h2>

        <label for="name">First Name:</label>
        <input type="text " name="firstname" id="name" placeholder="e.g. aditya">
        <br> <br>

        <label for="surname">Last Name:</label>
        <input type="text " name="Lastname " id="surname" placeholder="e.g. waykole">
        <br> <br>

        <label for="dob">DOB:</label>
        <input type="date" name="dob" id="dob">
        <br><br>

        <label for="male">Male</label>
        <input type="radio" name = "gender" id="male" value="male">
        <br>

        <label for="female">female</label>
        <input type="radio" name = "gender" id="female" value="female">
        <br>

        <label for="other">Other</label>
        <input type="radio" name = "gender" id="other" value="other">

        <br><br>

        <h3>Upload your photo </h3>

        <input type="file" name="file">

        <hr>

        <h2>contact information </h2>

        <label for="email">Email Address</label>
        <input type="email" name="mail" id="email" placeholder="abc@gmail.com">
        <br><br>

        <label for="phone"> phone</label>
        <input type="tel" name="phone" id="phone">
        <br><br>

        <label for="add">Mailing Address</label>
        <br>
        <textarea name="Address" id="add" rows="10" cols="30"></textarea>


    </form>



    
</body>
</html>
